<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script src="js/index.js"></script>
    <title>The Fable of the Eclipse</title>
</head>
<body>
    <header>
        <div class="row">
            <h1>The Fable of the Eclipse</h1>
            <div class="space"></div>
            <button class="menu-hider" status="hiden" id="menu-hider" onclick="ChangeMenuVisibility()"><iconify-icon icon="material-symbols:menu"></iconify-icon></button>
        </div>
    </header>
    <main>
        <iframe id="frame" class="page-container" src="html/game.html" frameborder="0"></iframe>
        <ul class="menu-list column" id="menu">
            <li class="menu-div"><p>Game</p><button class="menu-button" onclick="SetSource('game')"><iconify-icon icon="material-symbols:stadia-controller"></iconify-icon></button></div>
            <li class="menu-div"><p>History</p><button class="menu-button" onclick="SetSource('history')"><iconify-icon icon="material-symbols:history-edu"></iconify-icon></button></div>
            <li class="menu-div"><p>Team</p><button class="menu-button" onclick="SetSource('team')"><iconify-icon icon="ic:baseline-groups"></iconify-icon></button></div>
            <li class="menu-div"><p>Tools</p><button class="menu-button" onclick="SetSource('tools')"><iconify-icon icon="octicon:gear"></iconify-icon></button></div>
            <li class="menu-div"><p>Process</p><button class="menu-button" onclick="SetSource('process')"><iconify-icon icon="mdi:progress-clock"></iconify-icon></button></div>
            <li class="menu-div"><p>Post-mortem</p><button class="menu-button" onclick="SetSource('post-mortem')"><iconify-icon icon="lsicon:work-order-filled"></iconify-icon></button></div>
            <li class="menu-div"><p>Source Code</p><button class="menu-button" onclick="GoToPage('https://github.com/Mini-Knight-Studio/The-Fable-Of-The-Eclipse')"><iconify-icon icon="gridicons:code"></iconify-icon></button></div>
            <li class="space"></div>
        </ul>
    </main>
    <footer>
        <div class="row">
            <p class="copyright">Copyright © 2026 Mini Knight Studio. All rights reserved.</p>
            <div class="space"></div>
            <button class="social-media-access"><iconify-icon icon="ic:baseline-email"></iconify-icon></button>
            <button class="social-media-access"><iconify-icon icon="mdi:github"></iconify-icon></buttonclass></button>
        </div>
    </footer>
</body>
</html>
