<!DOCTYPE html>
    <html lang="en">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
        
        <link rel="stylesheet" href="../css/team.css">
        <script src="../js/team.js"></script>
    </head>
    <body>
        <div class="studio">

        </div>

        <div class="team">
            <h1 class="team-title">Meet Our Team</h1>
            <p class="team-text">The ones behind the Eclipse</p>
            <div class="section-list">
                <h2 class="section-title">Organization</h2>
                <div class="row">
                    <div class="space"></div>
                    <div class="member-card" id="tm1">
                        <div class="row">
                            <div class="show-profile">
                                <button class="member-preview" onclick="DisplayCard('tm1')">
                                    <img src="../assets/team/member.png" alt="">
                                    <p class="preview-name">Member</p>
                                </button>
                            </div>
                            <div class="display column">
                                <div class="row">
                                    <div class="member-image">
                                        <img src="../assets/team/member.png" alt="">
                                    </div>
                                    <div class="member-info">
                                        <div class="column">
                                            <h1 class="display-name">Member</h1>
                                            <h2 class="display-role">Role</h2>
                                        </div>
                                    </div>
                                </div>
                                <div class="member-task-carousel row" slide="1">
                                    <button class="carousel-button previous" onclick="SetPreviousTask('tm1')">
                                        <iconify-icon icon="ooui:previous-ltr"></iconify-icon>
                                    </button>
                                    
                                    <div class="carousel-track active" slide="1" onclick="stopCarouselAutoScroll()">
                                        <p>hola (Slide 1)</p>
                                    </div>
                                    <div class="carousel-track" slide="2" onclick="stopCarouselAutoScroll()">
                                        <div class="text-container column">
                                            <h1 class="task-title">Title</h1>
                                            <p class="task-text">This is an example of a task text a member has done</p>
                                        </div>
                                        <iframe data-src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                                    </div>
                                    <div class="carousel-track" slide="3" onclick="stopCarouselAutoScroll()">
                                        <p>hola (Slide 3)</p>
                                    </div>
                                    
                                    <button class="carousel-button next" onclick="SetNextTask('tm1')">
                                        <iconify-icon icon="ooui:previous-rtl"></iconify-icon>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space"></div>
                </div>
            </div>
        </div>
    </body>
</html>
